[Openmatb]
# If language is missing, en_EN will be loaded
language=en_EN

# If multiple screens layout, you can modify the index
# Default : screen_index=0
screen_index=0

# If you don't like the default font, feel free to specify a different one below.
# (Leave it empty to get your system default font)
font_name=

# Fullscreen mode
# Default : fullscreen=True
fullscreen=False

# Scenario choice
# Example  : scenario_path=Parasuraman_et_al_1993/high_reliability_block.txt
scenario_path=individual_tasks_instructions.txt

# Experiment choice (A, B, C, D, or E)
experiment=A

# Participant ID
participant_id=1001

# Record webcam face video for each block when using run_experiment.py
record_face=True

# Stream B (within-subject) order: auto | low-high | high-low
stream_b_order=auto

# Stream C (between-subject) condition: auto | low | high
stream_c_condition=auto

# Stream D (within-subject, calibrated) order: auto | low-high | high-low
stream_d_order=auto

# Stream E (between-subject, calibrated) condition: auto | low | high
stream_e_condition=auto

# If True, repeat instruction session when combined 2-min instruction accuracy is below threshold
repeat_instructions_if_below_threshold=True

# Overall instruction accuracy threshold in [0, 1]
instruction_accuracy_threshold=0.60

# Maximum number of instruction repeats per participant
max_instruction_repeats=2

# ---------------- Capacity calibration schema (Experiments D/E only) ----------------
# Integrated multipliers used during calibration (for reference/logging)
calibration_m_values=[0.70,0.85,1.00,1.15]

# Composite score target used to estimate participant capacity m*
capacity_score_target=0.75

# Optional fitted values (fill after calibration fit if you externalize fitting)
capacity_m_star=
capacity_m_low=
capacity_m_high=

# Set true if above fitted values were computed and reviewed
capacity_is_fitted=False

# Display the session number at start
display_session_number=True

# Hide the MATB environment on pause ("P" or "Escape" keys)
hide_on_pause=False

# Highlight widgets area of interest (AOI)
# If True, will display a red frame around each widget, as well as its name
highlight_aoi=False

# If you want to run the task without a joystick
no_joystick=True


# Vertical bounds between plugins areas
# (Warning: modify only if you need to change plugins from their initial default location)
# Default values: top_bounds=[0.35, 0.85] | bottom_bounds=[0.30, 0.85]
top_bounds=[0.35, 0.85]
bottom_bounds=[0.30, 0.85]
